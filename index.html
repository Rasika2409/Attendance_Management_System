<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management System - Login</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to bottom, #e0dfff, #f8f4ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .login-container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            width: 350px;
            text-align: center;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #1a1a1a;
        }
        
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn-login {
            width: 100%;
            padding: 10px;
            background: #2c58ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .btn-login:hover {
            background: #1f40d2;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter name">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="role">
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
        </select>
        </div>
        <button class="btn-login" onclick="login()">Login</button>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const role = document.getElementById('role').value;

            if (!username || !password) {
                alert("Enter username and password!");
                return;
            }

            if (role === "Student") {
                if (password === username + "@123") {
                    window.location.href = "dashboard.html?role=Student&user=" + username.toUpperCase();
                } else {
                    alert("Invalid Student Password! (Use name@123)");
                }
            } else if (role === "Teacher") {
                const teachers = {
                    "Shailja Panhalkar": "9356621149",
                    "Sneha Kadam": "9922245711",
                    "Amruta Chitari": "9850006190",
                    "Vanashri Jadhav": "8149287529",
                    "Snehal Patil": "9158644383",
                    "Rucha Gurav": "9423367021"
                };
                if (teachers[username] && teachers[username] === password) {
                    window.location.href = "dashboard.html?role=Teacher&user=" + username;
                } else {
                    alert("Invalid Teacher Username or Phone Number!");
                }
            }
        }
    </script>

</body>

</html>
